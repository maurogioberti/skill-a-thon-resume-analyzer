<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume-Skills MVP</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #f3ebdd;
        --panel: rgba(255, 249, 239, 0.86);
        --panel-strong: rgba(255, 252, 246, 0.96);
        --panel-deep: rgba(39, 24, 13, 0.9);
        --border: rgba(98, 67, 42, 0.16);
        --text: #23170d;
        --muted: #705840;
        --accent: #c44d24;
        --accent-2: #1d7c63;
        --accent-soft: #f3d6c0;
        --shadow: 0 25px 70px rgba(74, 46, 25, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 204, 145, 0.85), transparent 24%),
          radial-gradient(circle at 90% 10%, rgba(29, 124, 99, 0.12), transparent 18%),
          radial-gradient(circle at 80% 80%, rgba(196, 77, 36, 0.16), transparent 22%),
          linear-gradient(180deg, #fbf4e7 0%, var(--bg) 100%);
      }

      .page {
        width: min(1160px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      .hero {
        display: grid;
        gap: 22px;
        margin-bottom: 28px;
      }

      .hero-card {
        position: relative;
        overflow: hidden;
        display: grid;
        gap: 20px;
        padding: 28px;
        border-radius: 34px;
        background:
          linear-gradient(135deg, rgba(255, 249, 239, 0.94), rgba(255, 241, 228, 0.85)),
          radial-gradient(circle at top right, rgba(29, 124, 99, 0.16), transparent 26%);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .hero-card::after {
        content: "";
        position: absolute;
        inset: auto -30px -40px auto;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(196, 77, 36, 0.22), transparent 70%);
        pointer-events: none;
      }

      .hero-grid {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.8fr);
        gap: 20px;
        align-items: start;
      }

      h1,
      h2 {
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
      }

      h1 {
        margin: 0;
        max-width: 9ch;
        font-size: clamp(3rem, 9vw, 5.8rem);
        line-height: 0.88;
        letter-spacing: -0.05em;
      }

      .subtitle {
        max-width: 54ch;
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.6;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(98, 67, 42, 0.13);
        color: var(--muted);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .hero-note {
        display: grid;
        gap: 14px;
        padding: 18px;
        border-radius: 26px;
        background: var(--panel-deep);
        color: #fff4ea;
      }

      .hero-note-label {
        margin: 0;
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: rgba(255, 244, 234, 0.72);
      }

      .hero-note-text {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: 1.28rem;
        line-height: 1.45;
      }

      .hero-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .hero-stat {
        padding: 14px 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(98, 67, 42, 0.1);
      }

      .hero-stat strong,
      .hero-stat span {
        display: block;
      }

      .hero-stat strong {
        font-size: 1rem;
      }

      .hero-stat span {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .panel {
        backdrop-filter: blur(12px);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
      }

      .composer {
        display: grid;
        gap: 18px;
        padding: 22px;
      }

      .composer-header,
      .results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .panel-title {
        margin: 0;
        font-size: 1.15rem;
      }

      .panel-copy {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .status-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent-soft), rgba(255, 255, 255, 0.8));
        color: #8b3e22;
        font-size: 0.9rem;
        font-weight: 700;
      }

      textarea {
        width: 100%;
        min-height: 320px;
        resize: vertical;
        border: 1px solid rgba(115, 89, 67, 0.18);
        border-radius: 20px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--text);
        font: inherit;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 13px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
        transform: none;
      }

      .primary {
        background: linear-gradient(135deg, #db5d30, var(--accent));
        color: white;
      }

      .secondary {
        background: white;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .message {
        margin: 0;
        color: var(--muted);
      }

      .error {
        color: #a03434;
      }

      .results {
        display: grid;
        gap: 16px;
        padding: 22px;
      }

      .results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }

      .card {
        padding: 16px;
        border-radius: 22px;
        background: var(--panel-strong);
        border: 1px solid rgba(115, 89, 67, 0.12);
        box-shadow: 0 10px 24px rgba(74, 46, 25, 0.05);
      }

      .label {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .value {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.5;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: linear-gradient(135deg, #f6e4d8, #fbeee4);
        color: #7c4327;
        font-weight: 700;
      }

      .companies {
        display: grid;
        gap: 12px;
      }

      .company {
        padding: 14px 16px;
        border-radius: 18px;
        background: #fff;
        border: 1px solid rgba(115, 89, 67, 0.12);
      }

      .company-name {
        margin: 0 0 4px;
        font-size: 1rem;
      }

      .company-meta,
      .company-description {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .summary {
        padding: 18px;
        border-radius: 22px;
        background: linear-gradient(135deg, rgba(255, 244, 236, 0.98), rgba(242, 255, 251, 0.92));
        border: 1px solid rgba(29, 124, 99, 0.16);
      }

      .footer-note {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--accent-2);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .pulse {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 0 0 rgba(29, 124, 99, 0.35);
        animation: pulse 1.8s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(29, 124, 99, 0.35);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(29, 124, 99, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(29, 124, 99, 0);
        }
      }

      @media (max-width: 760px) {
        .page {
          width: min(100vw - 20px, 1160px);
          padding-top: 22px;
        }

        .hero-grid {
          grid-template-columns: 1fr;
        }

        .hero-meta {
          grid-template-columns: 1fr;
        }

        .composer-header,
        .results-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const sampleResume = `# Maya Chen

## Headline
Product-minded AI engineer focused on resume intelligence, workflow automation, and demo-friendly user experiences.

## Skills
- Python
- LLM Engineering
- Prompt Design
- FastAPI
- React
- Data Analysis
- API Design

## Work Experience
- Senior AI Engineer at OpenAI (2023-Present)
- Machine Learning Engineer at BrightPath Health (2021-2023)
- Data Analyst at Acme Analytics (2018-2021)`;

      function App() {
        const [resumeText, setResumeText] = React.useState(sampleResume);
        const [result, setResult] = React.useState(null);
        const [error, setError] = React.useState("");
        const [loading, setLoading] = React.useState(false);
        const [welcomeText, setWelcomeText] = React.useState("Loading today's welcome from Ollama...");

        React.useEffect(() => {
          let alive = true;

          async function loadWelcome() {
            try {
              const response = await fetch("/welcome");
              const data = await response.json();
              if (!response.ok) {
                throw new Error(data.detail || "Could not load welcome text.");
              }
              if (alive) {
                setWelcomeText(data.message || "Welcome to the hackathon demo.");
              }
            } catch (err) {
              if (alive) {
                setWelcomeText("Welcome to the hackathon demo. Paste a resume and let the agent build a polished candidate story.");
              }
            }
          }

          loadWelcome();

          return () => {
            alive = false;
          };
        }, []);

        async function handleAnalyze() {
          setLoading(true);
          setError("");

          try {
            const response = await fetch("/analyze", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ resume: resumeText }),
            });

            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.detail || data.error || "Something went wrong.");
            }

            setResult(data);
          } catch (err) {
            setResult(null);
            setError(err.message || "Request failed.");
          } finally {
            setLoading(false);
          }
        }

        function handleReset() {
          setResumeText(sampleResume);
          setError("");
        }

        return (
          <main className="page">
            <header className="hero">
              <section className="hero-card">
                <div className="hero-grid">
                  <div>
                    <div className="eyebrow">Hackathon MVP • Reusable AI skills</div>
                    <h1>Resume analysis that feels ready for the stage.</h1>
                    <p className="subtitle">
                      Paste a markdown resume, run the agent pipeline, and turn raw candidate notes
                      into a fast, readable story for demos, judging, and live review.
                    </p>
                  </div>

                  <aside className="hero-note">
                    <p className="hero-note-label">Welcome Message</p>
                    <p className="hero-note-text">{welcomeText}</p>
                  </aside>
                </div>

                <div className="hero-meta">
                  <div className="hero-stat">
                    <strong>4 skills</strong>
                    <span>Parse, enrich, analyze, summarize.</span>
                  </div>
                  <div className="hero-stat">
                    <strong>Local-first</strong>
                    <span>Works with Ollama and degrades gracefully.</span>
                  </div>
                  <div className="hero-stat">
                    <strong>Live demo</strong>
                    <span>One API, one page, one fast narrative.</span>
                  </div>
                </div>
              </section>
            </header>

            <section className="panel composer">
              <div className="composer-header">
                <div>
                  <h2 className="panel-title">Resume Input</h2>
                  <p className="panel-copy">Markdown-first, but tolerant of pasted plain text.</p>
                </div>
                <div className="status-pill">{loading ? "Running pipeline..." : "Ready to analyze"}</div>
              </div>

              <textarea
                value={resumeText}
                onChange={(event) => setResumeText(event.target.value)}
                placeholder="Paste resume markdown or plain text here"
              />

              <div className="actions">
                <button className="primary" onClick={handleAnalyze} disabled={loading}>
                  {loading ? "Analyzing..." : "Analyze Resume"}
                </button>
                <button className="secondary" onClick={handleReset} disabled={loading}>
                  Restore Sample
                </button>
              </div>

              <p className={`message ${error ? "error" : ""}`}>
                {error || "The API response is rendered directly from the same agent output used by the CLI demo."}
              </p>
            </section>

            {result ? (
              <section className="panel results">
                <div className="results-header">
                  <div>
                    <h2 className="panel-title">Candidate Snapshot</h2>
                    <p className="panel-copy">Same JSON shape as the backend response.</p>
                  </div>
                  <div className="footer-note">
                    <span className="pulse"></span>
                    Landing welcome refreshes on every page load
                  </div>
                </div>

                <div className="results-grid">
                  <article className="card">
                    <p className="label">Candidate</p>
                    <p className="value">{result.candidate || "Unknown Candidate"}</p>
                  </article>

                  <article className="card">
                    <p className="label">Level</p>
                    <p className="value">{result.analysis?.seniority || "Unknown"}</p>
                  </article>

                  <article className="card">
                    <p className="label">Specialization</p>
                    <p className="value">{result.analysis?.specialization || "Generalist"}</p>
                  </article>
                </div>

                <article className="card">
                  <p className="label">Top Skills</p>
                  {(result.analysis?.top_skills || []).length ? (
                    <div className="chips">
                      {result.analysis.top_skills.map((skill) => (
                        <span className="chip" key={skill}>
                          {skill}
                        </span>
                      ))}
                    </div>
                  ) : (
                    <p className="value">None identified</p>
                  )}
                </article>

                <article className="card">
                  <p className="label">Companies</p>
                  {(result.company_enrichment || []).length ? (
                    <div className="companies">
                      {result.company_enrichment.map((company) => (
                        <div className="company" key={company.company}>
                          <h3 className="company-name">{company.company}</h3>
                          <p className="company-meta">{company.industry}</p>
                          <p className="company-description">{company.description}</p>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <p className="value">No companies found</p>
                  )}
                </article>

                <article className="summary">
                  <p className="label">Summary</p>
                  <p className="value">{result.summary || "Professional summary unavailable."}</p>
                </article>
              </section>
            ) : null}
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
